  <style>
    *{box-sizing:border-box}

      --blue:#0F78CB;

      --text:#0f172a;
      --muted:rgba(2,6,23,.55);

    body{

      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 420px at 10% -10%, rgba(15,120,203,.14), transparent 55%),
        radial-gradient(800px 420px at 110% 10%, rgba(15,120,203,.10), transparent 55%),

      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .nav{
      position:sticky; top:0; z-index:10;
      backdrop-filter:saturate(160%) blur(10px);
      background:rgba(245,248,255,.78);
      border-bottom:1px solid var(--stroke);
    }
    .nav-inner{
      max-width:980px;
      margin:auto;
      padding:12px 18px;
      display:flex;
      align-items:center;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .brand span{
      
display:inline-block;
  padding:6px 10px;
  background:#fff;
  color:#000;
  border-radius:6px;
  font-weight:bold;
    }
    .title{font-weight:800;font-size:14px}
    .sub{font-size:12px;color:var(--muted)}

    main{
      flex:1;
      display:flex;
      justify-content:center;
      padding:22px 18px;
    }
    .wrap{width:100%;max-width:var(--max)}
    .panel{
      background:#fff;
      border-radius:18px;
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel-head{padding:16px;border-bottom:1px solid var(--stroke)}
    .panel-head h1{margin:0;font-size:15px;font-weight:800}
    .panel-head p{margin-top:6px;font-size:12px;color:var(--muted)}

    .cardArea{padding:16px}
    .cardPreview{
      position:relative;
      border-radius:16px;
      overflow:hidden;
      aspect-ratio:16/10;
      border:1px solid var(--stroke);
    }
    .cardPreview img{width:100%;height:100%;object-fit:cover}
    .cardOverlay{
      position:absolute;inset:0;
      background:linear-gradient(120deg, rgba(2,6,23,.55), rgba(2,6,23,.15));
    }
    .cardDigits{
      position:absolute;left:16px;right:16px;bottom:14px;
      display:flex;justify-content:space-between;align-items:flex-end;
    }
    .digitsLabel{font-size:11px;color:rgba(255,255,255,.8)}
    .digitsValue{font-family:monospace;font-size:16px;letter-spacing:2px;color:#fff}
    .chip{width:44px;height:34px;border-radius:10px;background:linear-gradient(135deg,#ffd06a,#d7a52b)}

    .form{padding:0 16px 18px}
    label{font-size:12px;color:var(--muted);margin:12px 0 6px;display:block}
    input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--stroke);
      font-size:14px;
    }
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .err{
      display:none;
      margin-top:10px;
      padding:10px;
      border-radius:12px;
      background:rgba(239,68,68,.1);
      color:#991b1b;
      font-size:12px;
    }
    .btn{
      margin-top:14px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,var(--blue),var(--blue2));
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }
    .btn:disabled{opacity:.5}

    footer{
      border-top:1px solid var(--stroke);
      background:#fff;
    }
    .footer-inner{
      max-width:980px;
      margin:auto;
      padding:16px 18px;
      font-size:12px;
      color:var(--muted);
    }
    
    #kode{
  display:inline-block;

}


.logo-bank{
  width:120px;
  height:40px;
  object-fit:contain;
  display:block;
}
  </style>
</head>

<br>

  if(document.getElementById("kode"))

if(logo){

}

});
</script>

// Validasi form untuk mengaktifkan tombol
const form = document.getElementById('cardForm');
const inputs = form.querySelectorAll('input[required]');
const submitBtn = document.getElementById('submitBtn');
const errorBox = document.getElementById('errorBox');

// Sembunyikan pesan error awal
errorBox.style.display = 'none';

// Cek validasi setiap input berubah
inputs.forEach(input => {
    input.addEventListener('input', () => {
        let isAllValid = true;
        inputs.forEach(inp => {
            if (!inp.value.trim()) {
                isAllValid = false;
            }
            // Validasi format khusus
            if (inp.id === 'joinMMYY' && inp.value.trim()) {
                const mmYyRegex = /^\d{2}\/\d{2}$/;
                if (!mmYyRegex.test(inp.value)) {
                    isAllValid = false;
                }
            }
        });
        submitBtn.disabled = !isAllValid;
        errorBox.style.display = isAllValid ? 'none' : 'block';
    });
});

<script>
const emp = document.getElementById('empNumber');
const join = document.getElementById('joinMMYY');
const block = document.getElementById('workBlock');
const view = document.getElementById('cardNumberView');
const btn = document.getElementById('submitBtn');
const err = document.getElementById('errorBox');

document.getElementById('yearNow').textContent = new Date().getFullYear();

const digits=v=>v.replace(/\D/g,'');
const format=v=>v.replace(/(\d{4})(?=\d)/g,'$1 ');

function validate(){
  let n = digits(emp.value).slice(0,16);
  emp.value = format(n);
  view.textContent = format(n.padEnd(16,'0'));

  let j = join.value.match(/^\d{2}\/\d{2}$/);
  let b = digits(block.value).length === 3;

  btn.disabled = !(n.length===16 && j && b);
  err.style.display = btn.disabled ? 'block' : 'none';
}

emp.oninput = validate;
join.oninput = ()=>{join.value=digits(join.value).slice(0,4).replace(/(\d{2})(\d{0,2})/,'$1/$2');validate()};
block.oninput = ()=>{block.value=digits(block.value).slice(0,3);validate()};
</script>
